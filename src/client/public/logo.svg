<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 56">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&amp;display=swap');
    </style>
  </defs>
  <!-- Terminal prompt -->
  <text x="0" y="40" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="500" fill="#4B8DFF" opacity="0.5">&gt;_</text>
  <!-- CLI — bold accent -->
  <text x="60" y="40" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="#4B8DFF">CLI</text>
  <!-- Trigger — lighter -->
  <text x="156" y="40" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="500" fill="#EBEBEB">Trigger</text>
  <!-- Cursor blink -->
  <rect x="340" y="14" width="3" height="30" rx="1" fill="#4B8DFF" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
