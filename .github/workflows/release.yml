name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Package release artifact
        run: |
          tar -czf clitrigger-${{ github.ref_name }}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            .env.example \
            LICENSE \
            docs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: clitrigger-${{ github.ref_name }}.tar.gz

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
