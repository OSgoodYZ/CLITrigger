name: Claude Code - Manual Dispatch

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Claude에게 전달할 작업 프롬프트'
        required: true
        type: string
      branch:
        description: '작업할 브랜치 이름 (비우면 자동 생성)'
        required: false
        type: string
      create_pr:
        description: 'PR 자동 생성'
        required: false
        type: boolean
        default: true

jobs:
  claude-dispatch:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd src/client && npm ci

      - name: Determine branch name
        id: branch
        run: |
          if [ -n "${{ inputs.branch }}" ]; then
            BRANCH_NAME="${{ inputs.branch }}"
          else
            BRANCH_NAME="claude/dispatch-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        run: git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Run Claude Code
        run: |
          claude --print --dangerously-skip-permissions <<'PROMPT'
          You are working on CLITrigger — a Node.js monorepo (server + React client) that orchestrates CLI AI tools (Claude, Gemini, Codex).

          ## Project structure
          - Server: src/server/ (Express + better-sqlite3 + WebSocket)
          - Client: src/client/ (React + Vite + TypeScript)
          - Tests: vitest for both server and client
          - Key services: orchestrator, scheduler, claude-manager, tunnel-manager

          ## Your task
          ${{ inputs.prompt }}

          ## Rules
          1. Implement the changes described above
          2. If adding i18n strings, add both Korean (ko) and English (en) translations in src/client/src/i18n.tsx
          3. Run `npm run typecheck` to verify no type errors
          4. Run `npm test` to verify all tests pass
          5. Commit your changes with a descriptive message
          PROMPT

      - name: Push and create PR
        if: inputs.create_pr
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"

          # Check if there are any changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes were made by Claude"
            echo "::warning::Claude Code가 코드 변경을 생성하지 못했습니다. 프롬프트를 더 구체적으로 작성해주세요."
            exit 0
          fi

          # Stage and commit any uncommitted changes
          git add -A
          git diff --cached --quiet || git commit -m "feat: manual dispatch — ${{ inputs.prompt }}"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Manual dispatch: ${{ inputs.prompt }}" \
            --body "$(cat <<EOF
          ## Summary
          Manually triggered Claude Code task.

          **Prompt:**
          > ${{ inputs.prompt }}

          **Triggered by:** @${{ github.actor }}

          ---
          Generated by Claude Code (workflow_dispatch)
          EOF
          )"

      - name: Push only
        if: '!inputs.create_pr'
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes were made by Claude"
            echo "::warning::Claude Code가 코드 변경을 생성하지 못했습니다."
            exit 0
          fi

          git add -A
          git diff --cached --quiet || git commit -m "feat: manual dispatch — ${{ inputs.prompt }}"

          git push origin "$BRANCH_NAME"
          echo "::notice::Branch '$BRANCH_NAME' pushed successfully"
