name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck client
        run: npm run typecheck:client

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm run test:server

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Run client tests
        run: npm run test:client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-server, test-client]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
