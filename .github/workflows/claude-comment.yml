name: Claude Code - Comment Command

on:
  issue_comment:
    types: [created]

jobs:
  claude-command:
    # issue_comment fires on both issues and PRs — filter for @claude mention
    if: >-
      contains(github.event.comment.body, '@claude') &&
      !github.event.issue.pull_request &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: React to comment
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' --silent

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd src/client && npm ci

      - name: Extract command
        id: cmd
        run: |
          # Extract everything after @claude
          COMMENT_BODY=$(cat <<'COMMENT_EOF'
          ${{ github.event.comment.body }}
          COMMENT_EOF
          )
          COMMAND=$(echo "$COMMENT_BODY" | sed 's/.*@claude[[:space:]]*//')
          echo "command<<CMD_EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMAND" >> "$GITHUB_OUTPUT"
          echo "CMD_EOF" >> "$GITHUB_OUTPUT"

      - name: Create branch and run Claude
        id: claude
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="claude/comment-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          claude --print --dangerously-skip-permissions <<'PROMPT'
          You are working on CLITrigger — a Node.js monorepo (server + React client) that orchestrates CLI AI tools (Claude, Gemini, Codex).

          ## Project structure
          - Server: src/server/ (Express + better-sqlite3 + WebSocket)
          - Client: src/client/ (React + Vite + TypeScript)
          - Tests: vitest for both server and client
          - Key services: orchestrator, scheduler, claude-manager, tunnel-manager

          ## Context
          **Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}**

          ${{ github.event.issue.body }}

          ## Command from @${{ github.event.comment.user.login }}
          ${{ steps.cmd.outputs.command }}

          ## Rules
          1. Implement exactly what was requested in the command above
          2. If adding i18n strings, add both Korean (ko) and English (en) translations in src/client/src/i18n.tsx
          3. Run `npm run typecheck` to verify no type errors
          4. Run `npm test` to verify all tests pass
          5. Commit your changes with a descriptive message
          PROMPT

      - name: Push and create PR
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH_NAME="${{ steps.claude.outputs.branch }}"
          COMMAND="${{ steps.cmd.outputs.command }}"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes were made by Claude"
            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<'EOF'
          🤖 Claude Code가 요청을 처리했지만 코드 변경이 필요하지 않았습니다.
          요청을 더 구체적으로 작성해주세요.

          ---
          *Triggered by comment command*
          EOF
          )"
            exit 0
          fi

          git add -A
          git diff --cached --quiet || git commit -m "feat: issue #${ISSUE_NUMBER} comment command — ${COMMAND:0:72}"

          git push origin "$BRANCH_NAME"

          PR_URL=$(gh pr create \
            --title "Issue #${ISSUE_NUMBER}: ${COMMAND:0:72}" \
            --body "$(cat <<EOF
          ## Summary
          Automated implementation triggered by comment on #${ISSUE_NUMBER}

          **Command**: \`${COMMAND}\`
          **Requested by**: @${{ github.event.comment.user.login }}

          Closes #${ISSUE_NUMBER}

          ---
          *Generated by Claude Code (comment command)*
          EOF
          )")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          🤖 Claude Code가 작업을 완료했습니다!
          PR: ${PR_URL}

          ---
          *Triggered by comment command*
          EOF
          )"

  claude-command-pr:
    # Handle comments on pull requests
    if: >-
      contains(github.event.comment.body, '@claude') &&
      github.event.issue.pull_request &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: React to comment
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' --silent

      - name: Get PR branch
        id: pr
        run: |
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          echo "branch=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd src/client && npm ci

      - name: Extract command
        id: cmd
        run: |
          COMMENT_BODY=$(cat <<'COMMENT_EOF'
          ${{ github.event.comment.body }}
          COMMENT_EOF
          )
          COMMAND=$(echo "$COMMENT_BODY" | sed 's/.*@claude[[:space:]]*//')
          echo "command<<CMD_EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMAND" >> "$GITHUB_OUTPUT"
          echo "CMD_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude on PR branch
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "(no diff available)")

          claude --print --dangerously-skip-permissions <<'PROMPT'
          You are working on CLITrigger — a Node.js monorepo (server + React client) that orchestrates CLI AI tools (Claude, Gemini, Codex).

          ## Project structure
          - Server: src/server/ (Express + better-sqlite3 + WebSocket)
          - Client: src/client/ (React + Vite + TypeScript)
          - Tests: vitest for both server and client
          - Key services: orchestrator, scheduler, claude-manager, tunnel-manager

          ## Context
          This is PR #${{ github.event.issue.number }}.
          You are on the PR branch: ${{ steps.pr.outputs.branch }}

          ## Command from @${{ github.event.comment.user.login }}
          ${{ steps.cmd.outputs.command }}

          ## Rules
          1. Implement exactly what was requested in the command above
          2. If adding i18n strings, add both Korean (ko) and English (en) translations in src/client/src/i18n.tsx
          3. Run `npm run typecheck` to verify no type errors
          4. Run `npm test` to verify all tests pass
          5. Commit your changes with a descriptive message
          PROMPT

      - name: Push changes
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          BRANCH="${{ steps.pr.outputs.branch }}"

          if git diff --quiet && git diff --cached --quiet; then
            gh pr comment "$PR_NUMBER" --body "$(cat <<'EOF'
          🤖 Claude Code가 요청을 처리했지만 코드 변경이 필요하지 않았습니다.

          ---
          *Triggered by comment command*
          EOF
          )"
            exit 0
          fi

          git add -A
          COMMAND="${{ steps.cmd.outputs.command }}"
          git diff --cached --quiet || git commit -m "feat(pr): ${COMMAND:0:72}"

          git push origin "$BRANCH"

          gh pr comment "$PR_NUMBER" --body "$(cat <<'EOF'
          🤖 Claude Code가 요청한 변경사항을 PR에 push했습니다!

          ---
          *Triggered by comment command*
          EOF
          )"
